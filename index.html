
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asistencia rancho la primavera</title>    
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="La Secu">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        :root { --primary: #1d3557; --success: #25D366; --error: #e63946; --bg: #f0f2f5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .app-container { background: white; width: 100%; max-width: 400px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 25px 15px; text-align: center; }
        .content { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        #geo-lock { padding: 18px; border-radius: 15px; text-align: center; font-weight: bold; background: #f8f9fa; border: 2px dashed #ccc; color: #666; }
        .valid { background: #d4edda !important; color: #155724 !important; border: 2px solid #25D366 !important; }
        
        #main-form { display: none; flex-direction: column; gap: 12px; }
        label { font-size: 0.75rem; font-weight: bold; color: var(--primary); margin-left: 5px; }
        select, textarea { padding: 16px; border-radius: 12px; border: 1px solid #ddd; font-size: 1rem; width: 100%; outline: none; background: #fafafa; }

        .btn { padding: 18px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-gps { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-error { background: var(--error); }
        
        #input-area { display: none; flex-direction: column; gap: 12px; margin-top: 10px; border-top: 2px solid #f5f5f5; padding-top: 15px; }
        
        .history-container { width: 100%; max-width: 400px; margin-top: 20px; }
        .log-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border-left: 6px solid var(--primary); cursor: pointer; }
        .log-header { display: flex; justify-content: space-between; align-items: center; }
        .log-body { display: none; background: #fdfdfd; padding: 12px; border-radius: 10px; margin-top: 10px; font-size: 0.8rem; border: 1px solid #eee; white-space: pre-wrap; color: #333; line-height: 1.4; }
        .type-tag { font-size: 0.7rem; font-weight: 800; padding: 5px 10px; border-radius: 8px; }
        .btn-reenviar { margin-top: 12px; width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid var(--success); background: white; color: var(--success); font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1 style="margin:0; font-size:1.3rem;">PAPELERÍA LA SECU</h1>
        <p style="margin:5px 0 0; font-size:0.8rem; opacity:0.8;">Asistencia Digital</p>
    </div>

    <div class="content">
        <button id="btnStart" class="btn btn-gps" onclick="activarSensor()">🔓 VALIDAR UBICACIÓN</button>
        <div id="geo-lock">SISTEMA BLOQUEADO</div>

        <div id="main-form">
            <div>
                <label>EMPLEADO</label>
                <select id="employee">
                    <option value="">-- Elige tu nombre --</option>
                    <option value="Empleado 1">Empleado 1</option>
                    <option value="Empleado 2">Empleado 2</option>
                    <option value="Empleado 3">Empleado 3</option>
                </select>
            </div>

            <div id="action-btns" style="display:flex; flex-direction:column; gap:10px;">
                <button class="btn btn-success" onclick="prepararEnvio('ENTRADA')">REGISTRAR ENTRADA</button>
                <button class="btn btn-error" onclick="prepararEnvio('SALIDA')">REGISTRAR SALIDA</button>
            </div>

            <div id="input-area">
                <label id="label-tipo">COMENTARIOS</label>
                <textarea id="txtObs" rows="3" placeholder="Comentarios / Observaciones"></textarea>
                <button id="btnFinal" class="btn" onclick="registrar()">CONFIRMAR Y ENVIAR</button>
                <button onclick="location.reload()" style="background:none; border:none; color:#999; text-decoration:underline; font-size:0.75rem; margin-top:10px; width:100%;">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<div class="history-container">
    <p style="font-size: 0.75rem; color: #888; text-align: center; margin-bottom: 10px;">Historial de registros (Toca para expandir)</p>
    <div id="history-list"></div>
</div>

<script>
    const CONFIG = { lat: 18.87210, lon: -103.78070, rango: 150, tel: "523339019091" };
    let tipoSeleccionado = "";

    function activarSensor() {
        document.getElementById('geo-lock').innerHTML = "📡 BUSCANDO...";
        navigator.geolocation.watchPosition(verificar, () => {
            document.getElementById('geo-lock').innerHTML = "❌ ACTIVA GPS";
        }, { enableHighAccuracy: true });
    }

    function verificar(pos) {
        const d = calcDist(pos.coords.latitude, pos.coords.longitude, CONFIG.lat, CONFIG.lon);
        const lock = document.getElementById('geo-lock');
        const form = document.getElementById('main-form');
        document.getElementById('btnStart').style.display = "none";
        if (d <= CONFIG.rango) {
            lock.innerHTML = `✅ EN SITIO (${Math.round(d)}m)`;
            lock.className = "valid";
            form.style.display = "flex";
        } else {
            lock.innerHTML = `📍 FUERA DE RANGO (${Math.round(d)}m)`;
            lock.className = "";
            form.style.display = "none";
        }
    }

    function calcDist(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2-lat1)*Math.PI/180;
        const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function prepararEnvio(tipo) {
        if(!document.getElementById('employee').value) return alert("Elige tu nombre");
        tipoSeleccionado = tipo;
        document.getElementById('action-btns').style.display = "none";
        document.getElementById('input-area').style.display = "flex";
        document.getElementById('label-tipo').innerText = "COMENTARIOS DE " + tipo;
        const btn = document.getElementById('btnFinal');
        btn.innerText = "CONFIRMAR " + tipo;
        btn.className = (tipo === 'ENTRADA') ? "btn btn-success" : "btn btn-error";
    }

    function registrar() {
        const emp = document.getElementById('employee').value;
        const ahora = new Date();
        const hora = ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const fecha = ahora.toLocaleDateString('es-MX', {day:'2-digit', month:'short'});
        const obs = document.getElementById('txtObs').value || "Sin observaciones";

        const reporte = `🏢 *LA SECU - ASISTENCIA*\n👤 ${emp}\n🔘 ${tipoSeleccionado}\n🕒 ${hora}\n📅 ${fecha}\n📝 Obs: ${obs}\n\n✅ _Validado GPS Offline_`;

        // GUARDAR AUDITORÍA
        const reg = { emp, tipo: tipoSeleccionado, hora, fecha, reporte, ts: ahora.getTime() };
        let logs = JSON.parse(localStorage.getItem('rancho_vAudit')) || [];
        logs.unshift(reg);
        localStorage.setItem('rancho_vAudit', JSON.stringify(logs.slice(0,30)));
        renderHistory();

        ejecutarEnvio(reporte);
    }

    function ejecutarEnvio(texto) {
        // COPIAR AL PORTAPAPELES
        if (navigator.clipboard) {
            navigator.clipboard.writeText(texto).then(() => {
                if (!navigator.onLine) alert("📍 REPORTE COPIADO.\nWhatsApp no pegará el texto solo sin internet. Al abrir el chat, deja presionado y elige 'PEGAR'.");
            });
        }
        // LANZAR WHATSAPP
        window.location.href = `https://wa.me/${CONFIG.tel}?text=${encodeURIComponent(texto)}`;
    }

    function renderHistory() {
        const logs = JSON.parse(localStorage.getItem('rancho_vAudit')) || [];
        document.getElementById('history-list').innerHTML = logs.map((l, i) => `
            <div class="log-card" onclick="toggleLog(${i})">
                <div class="log-header">
                    <div>
                        <span style="font-weight:bold; font-size:0.9rem; display:block;">${l.emp}</span>
                        <small style="color:#888;">${l.fecha} | ${l.hora}</small>
                    </div>
                    <span class="type-tag" style="background:${l.tipo=='ENTRADA'?'#e7f9ee':'#fdecef'}; color:${l.tipo=='ENTRADA'?'#25D366':'#e63946'}">${l.tipo}</span>
                </div>
                <div id="details-${i}" class="log-body">
                    <b>TEXTO ORIGINAL:</b><hr style="border:0; border-top:1px solid #eee; margin:5px 0;">${l.reporte}
                    <button class="btn-reenviar" onclick="event.stopPropagation(); reenviar(${i})">📲 REENVIAR A WHATSAPP</button>
                </div>
            </div>
        `).join('');
    }

    function toggleLog(i) {
        const el = document.getElementById(`details-${i}`);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    function reenviar(idx) {
        const logs = JSON.parse(localStorage.getItem('rancho_vAudit')) || [];
        ejecutarEnvio(logs[idx].reporte);
    }

    renderHistory();
</script>
</body>
</html>
